name: Generate Pine Script

on:
  push:
    branches: [main]
    paths:
      - "data/events-*.md"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate worldwide-events.pine
        run: python scripts/generate-events.py

      - name: Commit updated Pine Script
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worldwide-events.pine
          git diff --cached --quiet || git commit -m "Regenerate worldwide-events.pine"
          git push
